<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام | بازی چیستان</title>
    <!--  قلم وزیرمتن از Google Fonts  -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        /* === تنظیمات عمومی === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            /* رنگ پشتیبان برای زمانی که SVG بارگذاری نشده */
            overflow: hidden;
            padding: 20px;
        }

        /* === کانتینر اصلی === */
        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* === پس‌زمینه SVG پویا === */
        .bg-svg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            /* اجازه کلیک روی فرم را می‌دهد */;
        }

        .bg-svg svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- انیمیشن‌های SVG --- */
        @keyframes float1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -20px) scale(1.05);
            }
        }
        @keyframes float2 {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            50% {
                transform: translate(-20px, 30px) rotate(5deg);
            }
        }
        @keyframes float3 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(15px, 25px) scale(0.95);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .float1 {
            animation: float1 8s ease-in-out infinite;
        }
        .float2 {
            animation: float2 10s ease-in-out infinite;
        }
        .float3 {
            animation: float3 12s ease-in-out infinite;
        }
        .pulse {
            animation: pulse 4s ease-in-out infinite;
        }
        .twinkle {
            animation: twinkle 3s ease-in-out infinite;
        }
        .twinkle-delay {
            animation: twinkle 3.5s ease-in-out infinite 0.5s;
        }

        /* === جعبه فرم با جلوه شیشه‌ای === */
        .glass-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 45px 40px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
        }

        /* === نشان و عنوان === */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 8px 20px rgba(255, 215, 0, 0.3));
            animation: float1 6s ease-in-out infinite;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .brand p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 400;
        }

        /* === فرم === */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #f6d365;
            box-shadow: 0 0 0 4px rgba(246, 211, 101, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-wrapper .svg-icon {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            margin: 0 14px 0 12px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .input-wrapper:focus-within .svg-icon {
            opacity: 1;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 0;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 15px;
            font-family: 'Vazirmatn', sans-serif;
            direction: rtl;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            font-size: 14px;
        }

        .input-wrapper input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(20, 25, 45, 0.9) inset !important;
            -webkit-text-fill-color: #fff !important;
        }

        /* === دکمه ثبت‌نام === */
        .btn-register {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Vazirmatn', sans-serif;
            color: #0b0e1a;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(253, 160, 133, 0.25);
            letter-spacing: 0.5px;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(253, 160, 133, 0.4);
        }

        .btn-register:active {
            transform: scale(0.97);
        }

        /* === لینک ورود === */
        .login-link {
            text-align: center;
            margin-top: 22px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .login-link a {
            color: #f6d365;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #fda085;
            text-decoration: underline;
        }

        /* === پیام وضعیت === */
        #statusMessage {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        #statusMessage.success {
            display: block;
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.2);
        }

        #statusMessage.error {
            display: block;
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        /* === پاسخ‌گو برای موبایل === */
        @media (max-width: 640px) {
            .glass-card {
                padding: 32px 24px;
                border-radius: 32px;
            }
            .brand h1 {
                font-size: 24px;
            }
            .input-wrapper input {
                font-size: 14px;
                padding: 14px 14px 14px 0;
            }
            .btn-register {
                font-size: 16px;
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== پس‌زمینه SVG پویا ===== -->

                <path d="M-22,-22 Q0,-38 22,-22 Q38,0 22,22 Q0,38 -22,22 Q-38,0 -22,-22Z" fill="none" stroke="#f6d365"
                stroke-width="0.8" opacity="0.1" />
            </g>

            <!-- ۲. علامت سؤال (سمت راست بالا) -->
            <g class="float2" transform="translate(1240, 160)">
                <text x="0" y="0" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="none"
                stroke="#fda085" stroke-width="2.5" opacity="0.25" text-anchor="middle" dominant-baseline="central">
                ?
            </text>
            <text x="0" y="0" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#fda085"
            opacity="0.08" text-anchor="middle" dominant-baseline="central">
            ?
        </text>
        <!-- حلقه‌های اطراف -->
        <circle cx="0" cy="0" r="48" fill="none" stroke="#fda085" stroke-width="0.8" opacity="0.1" />
        <circle cx="0" cy="0" r="64" fill="none" stroke="#fda085" stroke-width="0.6" opacity="0.06" />
    </g>

    <!-- ۳. ستاره‌های درخشان (پراکنده) -->

        <circle cx="300" cy="200" r="2" fill="#fff" opacity="0.6" />
        <circle cx="340" cy="180" r="1.2" fill="#fff" opacity="0.4" />
    </g>
    <g class="twinkle-delay">
        <circle cx="900" cy="120" r="2.5" fill="#fff" opacity="0.5" />

    </g>
    <g class="twinkle">

    </g>
    <g class="twinkle-delay">
        <circle cx="1150" cy="650" r="2.8" fill="#fff" opacity="0.5" />
        <circle cx="1180" cy="620" r="1.5" fill="#fff" opacity="0.3" />
    </g>
    <g class="twinkle">
        <circle cx="500" cy="450" r="1.8" fill="#fff" opacity="0.4" />

    <g class="twinkle-delay">
        <circle cx="950" cy="500" r="2.2" fill="#fff" opacity="0.4" />

    <!-- ۴. اشکال هندسی شناور -->
    <!-- مثلث -->
    <g class="float3" transform="translate(180, 600)">
        <polygon points="0,-20 17,12 -17,12" fill="none" stroke="#f6d365" stroke-width="1.5" opacity="0.15" />
        <polygon points="0,-12 10,7 -10,7" fill="none" stroke="#f6d365" stroke-width="1" opacity="0.1" />

    <!-- مربع -->
    <g class="float1" transform="translate(1260, 580)">
        <rect x="-16" y="-16" width="32" height="32" rx="4" fill="none" stroke="#fda085" stroke-width="1.5"
        opacity="0.15" />
        <rect x="-10" y="-10" width="20" height="20" rx="3" fill="none" stroke="#fda085" stroke-width="1"

    <!-- ۵. دایره‌های متحدالمرکز (پویا) -->

        <circle cx="0" cy="0" r="20" fill="none" stroke="#f6d365" stroke-width="0.8" opacity="0.1" />
        <circle cx="0" cy="0" r="35" fill="none" stroke="#fda085" stroke-width="0.6" opacity="0.06" />
        <circle cx="0" cy="0" r="50" fill="none" stroke="#f6d365" stroke-width="0.4" opacity="0.04" />
    </g>

    <!-- ۶. ذرات ریز متحرک (با خطوط منحنی) -->
    <path d="M80,300 Q150,200 220,280 T360,250" fill="none" stroke="#f6d365" stroke-width="0.8" opacity="0.06" />
    <path d="M1100,400 Q1180,320 1260,400 T1380,350" fill="none" stroke="#fda085" stroke-width="0.8" opacity="0.06" />

    <!-- ۷. یک جفت چشم کوچک (نماد چیستان) در پایین -->
    <g transform="translate(720, 820)" opacity="0.1">
        <ellipse cx="-10" cy="0" rx="6" ry="8" fill="none" stroke="#f6d365" stroke-width="1.2" />
        <ellipse cx="10" cy="0" rx="6" ry="8" fill="none" stroke="#f6d365" stroke-width="1.2" />

        <circle cx="10" cy="0" r="2.5" fill="#f6d365" />

</svg>
</div>

<!-- ===== جعبه فرم ===== -->
<div class="container">
    <div class="glass-card">

        <!-- برند -->
        <div class="brand">
            <span class="icon">🧩</span>
            <h1>ثبت‌نام در چیستان</h1>
            <p>هوش خود را محک بزنید و به جمع بازیکنان بپیوندید</p>
        </div>

        <!-- فرم -->
        <form id="registerForm" novalidate>
            <!-- نام کاربری -->
            <div class="form-group">
                <label for="username">نام کاربری</label>
                <div class="input-wrapper">
                    <!-- SVG آیکون کاربر -->
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <input type="text" id="username" name="username" placeholder="یک نام کاربری انتخاب کنید" required />
            </div>
        </div>

        <!-- ایمیل -->
        <div class="form-group">
            <label for="email">آدرس ایمیل</label>
            <div class="input-wrapper">
                <!-- SVG آیکون ایمیل -->
                <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
            </svg>
            <input type="email" id="email" name="email" placeholder="example@email.com" required />
        </div>
    </div>

    <!-- رمز عبور -->
    <div class="form-group">
        <label for="password">رمز عبور</label>
        <div class="input-wrapper">
            <!-- SVG آیکون قفل -->
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <input type="password" id="password" name="password" placeholder="حداقل ۶ کاراکتر" required minlength="6" />
    </div>
</div>

<!-- تکرار رمز عبور -->
<div class="form-group">
    <label for="passwordConfirm">تکرار رمز عبور</label>
    <div class="input-wrapper">
        <!-- SVG آیکون تیک -->
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

    قبلاً ثبت‌نام کرده‌اید؟ <a href="#">وارد شوید</a>

<script>
    (function() {
        'use strict';

        const form = document.getElementById('registerForm');
        const statusMsg = document.getElementById('statusMessage');

        // --- آدرس فایل users.json در GitHub (RAW) ---
        // توجه: لینک زیر را به لینک خام (raw) فایل users.json خود تغییر دهید.
        const USERS_JSON_URL =
            'https://raw.githubusercontent.com/babaeea675-gif/h/main/users.json';

        // --- تابع برای دریافت لیست کاربران از GitHub ---
        async function fetchUsers() {
            try {
                const response = await fetch(USERS_JSON_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                // اگر داده‌ها آرایه هستند، همان را برمی‌گردانیم، در غیر این صورت آرایه‌ای خالی
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('خطا در دریافت users.json:', error);
                // در صورت خطا، یک آرایه خالی برمی‌گردانیم تا فرم کار کند
                return [];
            }
        }

        // --- تابع برای ذخیره کاربر جدید (با شبیه‌سازی) ---
        // توجه: این تابع فقط در کنسول لاگ می‌کند و در حافظه محلی ذخیره می‌کند.
        // برای ذخیره واقعی روی GitHub به API و توکن نیاز است.
        async function saveUser(newUser) {
            try {
                // ۱. دریافت لیست فعلی کاربران
                const users = await fetchUsers();

                // ۲. بررسی تکراری نبودن نام کاربری یا ایمیل
                const existing = users.find(u =>
                    u.username === newUser.username || u.email === newUser.email
                );
                if (existing) {
                    return {
                        success: false,
                        message: 'این نام کاربری یا ایمیل قبلاً ثبت شده است.'
                    };
                }

                // ۳. اضافه کردن کاربر جدید به لیست
                users.push(newUser);

                // ۴. ذخیره در localStorage برای شبیه‌سازی (در مرورگر)
                localStorage.setItem('users_backup', JSON.stringify(users));

                // ۵. لاگ در کنسول (برای توسعه‌دهنده)
                console.log('👤 کاربر جدید با موفقیت ثبت شد:', newUser);
                console.log('📋 لیست تمام کاربران:', users);

                // در حالت واقعی، باید یک درخواست PATCH/PUT به GitHub API بفرستید.
                // مثال: (نیاز به توکن و تنظیمات بیشتر)
                // await fetch(USERS_JSON_URL, {
                //     method: 'PUT',
                //     headers: { 'Authorization': 'token YOUR_GITHUB_TOKEN' },
                //     body: JSON.stringify(users)
                // });

                return {
                    success: true,
                    message: `✅ ثبت‌نام شما با موفقیت انجام شد! خوش آمدید ${newUser.username} 🎉`
                };
            } catch (error) {
                console.error('خطا در ذخیره کاربر:', error);
                return {
                    success: false,
                    message: '❌ خطا در ارتباط با سرور. لطفاً دوباره تلاش کنید.'
                };
            }
        }

        // --- رویداد ارسال فرم ---
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // دریافت مقادیر
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            // --- اعتبارسنجی سمت کلاینت ---
            if (!username || username.length < 3) {
                showStatus('نام کاربری باید حداقل ۳ کاراکتر باشد.', 'error');
                return;
            }
            if (!email || !email.includes('@')) {
                showStatus('لطفاً یک ایمیل معتبر وارد کنید.', 'error');
                return;
            }
            if (!password || password.length < 6) {
                showStatus('رمز عبور باید حداقل ۶ کاراکتر باشد.', 'error');
                return;
            }
            if (password !== passwordConfirm) {
                showStatus('رمز عبور و تکرار آن مطابقت ندارند.', 'error');
                return;
            }

            // --- ساخت شیء کاربر ---
            const newUser = {
                username: username,
                email: email,
                password: password, // توجه: در دنیای واقعی رمز را هش کنید!
                registeredAt: new Date().toISOString(),
                score: 0,
                gamesPlayed: 0
            };

            // --- تلاش برای ذخیره کاربر ---
            const result = await saveUser(newUser);

            if (result.success) {
                showStatus(result.message, 'success');
                form.reset();
                // می‌توانید کاربر را به صفحه بازی هدایت کنید:
                // window.location.href = '/game.html';
            } else {
                showStatus(result.message, 'error');
            }
        });

        // --- تابع نمایش پیام وضعیت ---
        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = type; // 'success' یا 'error'
            // اگر پیام خطا باشد، پس از ۵ ثانیه مخفی می‌شود
            if (type === 'error') {
                setTimeout(() => {
                    statusMsg.className = '';
                    statusMsg.textContent = '';
                }, 5000);
            }
        }

        // --- (اختیاری) بارگذاری اولیه برای نمایش تعداد کاربران در کنسول ---
        fetchUsers().then(users => {
            console.log(`📊 تعداد کاربران موجود: ${users.length}`);
        });

    })();
</script>

</body>
</html>
